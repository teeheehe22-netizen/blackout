<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nothing to See Here</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: black;
      font-family: 'Courier New', monospace;
      color: #00ff00;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .terminal {
      text-align: center;
      width: 90%;
      max-width: 800px;
    }

    h1 {
      font-size: 3rem;
      text-shadow: 0 0 5px #00ff00, 0 0 15px #00ff00;
      animation: flicker 2s infinite;
      margin-bottom: 1rem;
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 22%, 24%, 55% { opacity: 0.3; }
    }

    h2 {
      font-size: 1.4rem;
      margin-bottom: 2rem;
      display: inline-block;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1em;
      background: #00ff00;
      animation: blink 1s infinite;
      margin-left: 5px;
    }

    @keyframes blink {
      50% { background: transparent; }
    }

    /* FLAGS */
    .flag {
      color: black;
      user-select: text;
      display: block;
      margin: 6px 0;
      text-decoration: none;
      opacity: 0;
    }

    .flag:hover {
      color: #222;
    }

    /* REAL FLAG IN CORNER */
    .real-flag {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: black; /* invisible on black background */
      user-select: text;
      font-size: 1rem;
    }
  </style>
</head>

<body>

  <!-- Real flag in corner -->
  <div class="real-flag">key: FLAG-12345</div>

  <div class="terminal">

    <h1>ACCESS DENIED</h1>

    <h2 id="subtitle"></h2><span class="cursor"></span>

    <!-- Fake flags -->
    <a class="flag" target="_blank">key: FLAG-PICK_ME</a>
    
    <a class="flag" target="_blank">key: FLAG-PROBABLY_NOT</a>
    
    <a class="flag" target="_blank">key: FLAG-ABSOLUTELY</a>

  </div>

  <script>
    // Typing subtitle
    const text = "Nothing to see here...";
    const el = document.getElementById("subtitle");
    let i = 0;

    function type() {
      if (i < text.length) {
        el.textContent += text[i];
        i++;
        setTimeout(type, 90);
      } else {
        showFlags();
      }
    }

    // Random links for fake flags
    const links = [
      "https://example.com",
      "https://google.com",
      "https://wikipedia.org",
      "https://github.com",
      "https://youtube.com"
    ];

    const flags = document.querySelectorAll(".flag");

    flags.forEach((flag) => {
      const rand = Math.floor(Math.random() * links.length);
      flag.href = links[rand];
    });

    // Reveal flags one by one
    let f = 0;
    function showFlags() {
      if (f < flags.length) {
        flags[f].style.opacity = 1;
        f++;
        setTimeout(showFlags, 400);
      }
    }

    type();
  </script>

</body>
</html>
